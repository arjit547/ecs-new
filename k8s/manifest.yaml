---
apiVersion: v1
kind: Namespace
metadata:
  name: arjit-2098
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: arjit-2098
  name: deployment-20
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: app-20
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app-20
    spec:
      containers:
      - image: 574128098491.dkr.ecr.us-east-1.amazonaws.com/k8:latest
        imagePullPolicy: Always
        name: k8
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  namespace: arjit-2098
  name: service-20
spec:
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
  type: NodePort
  selector:
    app.kubernetes.io/name: app-20
---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: arjit-2098
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: service-20
                port:
                  number: 80
